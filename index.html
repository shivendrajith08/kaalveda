<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="description" content="KaalVeda — Explore Everything. Learn Everything. Travel a connected path through the cosmos, history, religions, science, and civilizations." />

    <title>KaalVeda — Explore Everything. Learn Everything.</title>

    <!-- Prevent theme flash: apply the persisted theme before first paint. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('kaalveda-theme') || 'dark'
          if (t !== 'dark' && t !== 'light') t = 'dark'
          var root = document.documentElement
          root.dataset.theme = t
          root.style.colorScheme = t
          root.style.background = t === 'light' ? '#f4ecd8' : '#0d1117'
        } catch (e) {}
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
